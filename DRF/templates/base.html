{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}조회{% endblock %}</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts: Noto Sans KR, Nanum Myeongjo, Pretendard -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- ✨ 수정됨: 완전한 Google Fonts URL -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  {% block extra_css %}
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/header.css' %}">
  <link rel="stylesheet" href="{% static 'css/footer.css' %}">
  <link rel="stylesheet" href="{% static 'css/brokers/dashboard.css' %}">
  <link rel="stylesheet" href="{% static 'css/brokers/brokers_base.css' %}">
  <link rel="stylesheet" href="{% static 'css/brokers/broker1_list.css' %}">
  {% endblock %}

</head>
 <body>

  {% include 'header.html' %}

  <main class="container mt-4">
    {% block content %}
    {% endblock %}
  </main>

  {% include 'footer.html' %}

  {% block extra_js %}

  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey={{ kakao_key }}&libraries=services"></script>
  <script src="{% static 'js/brokers/dashboard.js' %}"></script>
  <script src="{% static 'js/brokers/broker1_list.js' %}"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  {% endblock %}

 </body>
</html>
