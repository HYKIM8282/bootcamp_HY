# Docker Compose v2 — `docker compose up -d` 로 실행
# 역할: Celery 비동기 큐를 보관하는 Redis 서버
#
# 사용:
#   docker compose up -d redis    # 백그라운드 시작
#   docker compose ps             # 상태 확인
#   docker compose logs -f redis  # 로그 보기
#   docker compose down           # 종료

services:
  redis:
    image: redis:7-alpine            # 가벼운 알파인 리눅스 기반 Redis 7
    container_name: bootcamp_redis   # docker ps 식별용 이름
    ports:
      - "6379:6379"                  # 호스트:컨테이너 — 로컬에서 redis-cli 접근 가능
    volumes:
      - redis_data:/data             # 컨테이너 재시작해도 데이터 유지
    restart: unless-stopped          # 수동 종료 외엔 자동 재시작
    healthcheck:                     # 살아있는지 자가 진단
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data:                        # 명시적 선언 (위에서 참조)
