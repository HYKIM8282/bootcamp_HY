{% extends "base.html" %}
{% load static %}

{% block title %}로그인{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/account/login.js' %}"></script>
{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-header fw-bold">로그인</div>
      <div class="card-body">

        <form id="loginForm" data-next="{{ next }}">
          <div class="mb-3">
            <label class="form-label small fw-semibold">아이디</label>
            <input type="text" id="id_username" name="username"
                   class="form-control form-control-sm" placeholder="아이디" autocomplete="username">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">비밀번호</label>
            <input type="password" id="id_password" name="password"
                   class="form-control form-control-sm" placeholder="비밀번호" autocomplete="current-password">
          </div>

          <div id="loginError" class="text-danger small mb-2" style="display:none;"></div>

          <div class="d-grid">
            <button type="submit" id="loginBtn" class="btn btn-primary btn-sm">로그인</button>
          </div>
        </form>

        <div class="text-center mt-3 small">
          계정이 없으신가요? <a href="{% url 'accounts:signup' %}">회원가입</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
