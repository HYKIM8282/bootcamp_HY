{% extends "base.html" %}
{% load static %}

{% block title %}회원가입{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/account/signup.js' %}"></script>
{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-header fw-bold">회원가입</div>
      <div class="card-body">

        <form id="signupForm">
          <div class="mb-3">
            <label class="form-label small fw-semibold">아이디</label>
            <input type="text" id="id_username" name="username"
                   class="form-control form-control-sm" placeholder="아이디" autocomplete="username">
            <div id="err_username" class="text-danger small mt-1" style="display:none;"></div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">이메일</label>
            <input type="email" id="id_email" name="email"
                   class="form-control form-control-sm" placeholder="이메일" autocomplete="email">
            <div id="err_email" class="text-danger small mt-1" style="display:none;"></div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">비밀번호</label>
            <input type="password" id="id_password1" name="password1"
                   class="form-control form-control-sm" placeholder="비밀번호" autocomplete="new-password">
            <div id="err_password1" class="text-danger small mt-1" style="display:none;"></div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">비밀번호 확인</label>
            <input type="password" id="id_password2" name="password2"
                   class="form-control form-control-sm" placeholder="비밀번호 확인" autocomplete="new-password">
            <div id="err_password2" class="text-danger small mt-1" style="display:none;"></div>
          </div>

          <div id="signupError" class="text-danger small mb-2" style="display:none;"></div>

          <div class="d-grid">
            <button type="submit" id="signupBtn" class="btn btn-primary btn-sm">가입하기</button>
          </div>
        </form>

        <div class="text-center mt-3 small">
          이미 계정이 있으신가요? <a href="{% url 'accounts:login' %}">로그인</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
